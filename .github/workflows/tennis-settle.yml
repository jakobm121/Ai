name: Tennis Value Settle

on:
  workflow_dispatch:
  schedule:
    # Runs 4 times per day UTC
    # Ljubljana time depends on daylight saving, but this is good enough for low API usage.
    - cron: "0 2,8,14,20 * * *"

permissions:
  contents: write

jobs:
  tennis-settle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Create folders
        run: |
          mkdir -p data
          mkdir -p web

      - name: Settle tennis results
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          python tennis_settle.py

      - name: Build tennis site
        run: |
          python build_tennis_site.py

      - name: Commit tennis settled results and site
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/tennis_results.json || true
          git add data/tennis_settle_debug.json || true

          git add web/tennis.html || true
          git add web/tennis_app.js || true
          git add web/tennis_style.css || true
          git add web/tennis_site_data.json || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Settle tennis results and update site"
            git push
          fi

      - name: Upload tennis settle artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tennis-settle-output
          path: |
            data/tennis_results.json
            data/tennis_settle_debug.json
            web/tennis_site_data.json
          if-no-files-found: warn

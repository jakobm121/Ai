name: Hana Totals Hub

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  hana-totals-hub:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Hana
        run: python hana.py

      - name: Commit Hana outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/hana/hana_predictions.json
          git add data/hana/hana_table.md
          git add data/hana/hana_debug.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update Hana totals hub"

          git pull --rebase --autostash origin main
          git push origin main

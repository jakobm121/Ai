name: Jure Profile Probe

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  jure-profile-probe:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Jure profile probe
        env:
          TENNIS_API_KEY: ${{ secrets.TENNIS_API_KEY }}
          TENNIS_API_BASE_URL: "https://v1.tennis.api-sports.io"
          TENNIS_API_HOST: "v1.tennis.api-sports.io"
          MAX_PLAYERS: "10"
          SLEEP_SECONDS: "0.4"
        run: |
          python jure_profile_probe.py

      - name: Commit Jure probe files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add jure_profile_probe.py
          git add jure/

          if git diff --cached --quiet; then
            echo "No Jure probe changes to commit"
          else
            git commit -m "Add Jure player history probe"
            git push
          fi

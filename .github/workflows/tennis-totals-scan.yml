name: Tennis Totals Market Scan

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tennis-totals-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Create folders
        run: |
          mkdir -p data

      - name: Run tennis totals market scan
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          python tennis_totals_market_scan.py

      - name: Commit tennis totals scan
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/tennis_totals_market_scan.json || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Scan tennis totals markets"
            git push
          fi

      - name: Upload tennis totals scan artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tennis-totals-market-scan
          path: |
            data/tennis_totals_market_scan.json
          if-no-files-found: warn

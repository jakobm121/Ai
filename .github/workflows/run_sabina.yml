name: Run Sabina

on:
  workflow_dispatch:
  push:
    paths:
      - "data/tennis_predictions.json"
      - "sabina/**"
      - ".github/workflows/run_sabina.yml"

permissions:
  contents: write

jobs:
  run-sabina:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check tennis predictions file exists
        run: |
          test -f data/tennis_predictions.json
          echo "Found data/tennis_predictions.json"

      - name: Run Sabina filter
        run: |
          python sabina/sabina.py

      - name: Show Sabina output
        run: |
          echo "Sabina files:"
          find sabina -maxdepth 4 -type f -print

      - name: Commit Sabina results to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add sabina/results/

          if git diff --cached --quiet; then
            echo "No Sabina result changes to commit."
          else
            git commit -m "Update Sabina results"
            git push
          fi

      - name: Upload Sabina results as artifact too
        uses: actions/upload-artifact@v4
        with:
          name: sabina-results
          path: |
            sabina/results/sabina_predictions.json
            sabina/results/sabina_today.csv
            sabina/results/sabina_history.json

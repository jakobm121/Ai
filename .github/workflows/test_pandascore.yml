name: Test PandaScore API

on:
  workflow_dispatch:

jobs:
  test-pandascore:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run PandaScore test
        env:
          PANDASCORE_API_KEY: ${{ secrets.PANDASCORE_API_KEY }}
        run: |
          python test_pandascore.py

      - name: Upload PandaScore test output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pandascore-test-output
          path: pandascore_test_output.json
          if-no-files-found: warn

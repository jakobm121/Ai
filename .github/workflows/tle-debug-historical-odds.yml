name: TLE Debug Historical Odds

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Historical date, YYYY-MM-DD"
        required: true
        default: "2026-06-09"

permissions:
  contents: write

jobs:
  debug-historical-odds:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout AI repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Probe historical odds endpoint
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          mkdir -p data/tle/debug

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          import requests

          api_key = os.environ["API_KEY"]
          target_date = "${{ inputs.date }}"

          base_url = "https://api.api-tennis.com/tennis/"

          attempts = [
              {
                  "name": "get_odds_date",
                  "params": {
                      "method": "get_odds",
                      "APIkey": api_key,
                      "date_start": target_date,
                      "date_stop": target_date,
                  },
              },
              {
                  "name": "get_odds_date_alt",
                  "params": {
                      "method": "get_odds",
                      "APIkey": api_key,
                      "from": target_date,
                      "to": target_date,
                  },
              },
              {
                  "name": "get_fixtures_with_odds",
                  "params": {
                      "method": "get_fixtures",
                      "APIkey": api_key,
                      "date_start": target_date,
                      "date_stop": target_date,
                      "with_odds": 1,
                  },
              },
          ]

          output = {
              "date": target_date,
              "attempts": [],
          }

          for attempt in attempts:
              try:
                  response = requests.get(
                      base_url,
                      params=attempt["params"],
                      timeout=40,
                  )

                  try:
                      payload = response.json()
                  except Exception:
                      payload = {
                          "raw_text": response.text[:2000],
                      }

                  result = payload.get("result") if isinstance(payload, dict) else None

                  if isinstance(result, list):
                      sample = result[:5]
                      result_count = len(result)
                  elif isinstance(result, dict):
                      sample = dict(list(result.items())[:5])
                      result_count = len(result)
                  else:
                      sample = result
                      result_count = None

                  output["attempts"].append({
                      "name": attempt["name"],
                      "url": response.url.replace(api_key, "***"),
                      "status_code": response.status_code,
                      "payload_keys": list(payload.keys()) if isinstance(payload, dict) else None,
                      "success": payload.get("success") if isinstance(payload, dict) else None,
                      "result_count": result_count,
                      "sample": sample,
                  })

              except Exception as exc:
                  output["attempts"].append({
                      "name": attempt["name"],
                      "error": repr(exc),
                  })

          path = Path("data/tle/debug/historical_odds_probe.json")
          path.write_text(
              json.dumps(output, indent=2, ensure_ascii=False) + "\n",
              encoding="utf-8",
          )

          print(json.dumps(output, indent=2, ensure_ascii=False))
          PY

      - name: Commit debug output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/tle/debug/historical_odds_probe.json

          if git diff --cached --quiet; then
            echo "No debug changes to commit."
            exit 0
          fi

          git commit -m "Debug TLE historical odds endpoint"
          git push

name: Build Tennis ELO

on:
  workflow_dispatch:
  schedule:
    - cron: "30 4 * * *"

permissions:
  contents: write

concurrency:
  group: build-tennis-elo
  cancel-in-progress: false

jobs:
  build-elo:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Pull latest changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git pull --rebase --autostash origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build tennis ELO
        env:
          ELO_START_YEAR: "2024"
        run: |
          python ratings/build_tennis_elo.py

      - name: Show rating files
        run: |
          find ratings -maxdepth 2 -type f -print

      - name: Commit ELO ratings
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add ratings/tennis_elo.json ratings/tennis_elo_report.json

          if git diff --cached --quiet; then
            echo "No ELO changes to commit."
            exit 0
          fi

          git commit -m "Update tennis ELO ratings"
          git pull --rebase --autostash origin main
          git push origin main

      - name: Upload ELO artifact
        uses: actions/upload-artifact@v4
        with:
          name: tennis-elo
          path: |
            ratings/tennis_elo.json
            ratings/tennis_elo_report.json
          if-no-files-found: error

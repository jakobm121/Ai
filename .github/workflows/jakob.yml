name: Run Jakob Tennis Totals Machine

on:
  workflow_dispatch:

  schedule:
    # Vsak dan ob 07:10 UTC
    # To je približno 09:10 po Sloveniji poleti oziroma 08:10 pozimi
    - cron: "10 7 * * *"

permissions:
  contents: write

concurrency:
  group: jakob-tennis-totals
  cancel-in-progress: false

jobs:
  run-jakob:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Jakob machine
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          python jakob.py

      - name: Show generated files
        run: |
          echo "Generated data files:"
          ls -lah data || true

          echo ""
          echo "Jakob files:"
          ls -lah data/jakob_*.json || true

      - name: Commit and push Jakob outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/jakob_*.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update Jakob tennis totals outputs"

          git pull --rebase origin main
          git push origin main

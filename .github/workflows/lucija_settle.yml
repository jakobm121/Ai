name: Lucija Settle

on:
  workflow_dispatch:
  schedule:
    # vsakih 30 minut med dnevom in zvečer
    - cron: "*/30 10-23 * * *"

permissions:
  contents: write

concurrency:
  group: lucija-settle
  cancel-in-progress: false

jobs:
  lucija-settle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Lucija settle
        run: python lucija_settle.py

      - name: Commit Lucija settled results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/lucija/

          if git diff --cached --quiet; then
            echo "No Lucija settle changes to commit."
          else
            git commit -m "Settle Lucija picks"
            git push
          fi

name: Test iSportsAPI Football

on:
  workflow_dispatch:

jobs:
  test-isportsapi:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run iSportsAPI test
        env:
          ISPORTS_API_KEY: ${{ secrets.ISPORTS_API_KEY }}
        run: python test_isportsapi.py

name: Tennis Totals Optimizer V2

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tennis-totals-optimizer-v2
  cancel-in-progress: false

jobs:
  run-optimizer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync branch before run
        run: |
          git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Run tennis totals optimizer v2
        run: |
          python scripts/tennis_totals_optimizer_v2.py

      - name: Commit and push optimizer outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/tennis_totals_optimizer_v2_report.json \
                  data/tennis_totals_ranked_top100.json \
                  data/tennis_totals_ranked_top200.json \
                  data/tennis_totals_ranked_top300.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update tennis totals optimizer v2 outputs"

          git pull --rebase origin main
          git push origin main

name: Tennis History Probe

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tennis-history-probe:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run API-Tennis history probe
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_TENNIS_BASE_URL: "https://api.api-tennis.com/tennis/"
          API_METHOD: "get_fixtures"
          DAYS_BACK: "10"
          PROBE_DIR: "jure_probe"
          MAX_RAW_ITEMS: "300"
        run: |
          python api_probe.py

      - name: Remove oversized old raw file if present
        run: |
          rm -f jure_probe/history_raw.json

      - name: Commit probe files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add api_probe.py
          git add jure_probe/history_raw_sample.json
          git add jure_probe/history_fields.json
          git add jure_probe/history_samples.json
          git add jure_probe/history_probe_debug.json
          git add jure_probe/history_probe_report.md

          if git diff --cached --quiet; then
            echo "No probe changes to commit"
          else
            git commit -m "Update tennis history probe"

            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "Push failed, retrying in 10 seconds..."
              sleep 10
            done
          fi

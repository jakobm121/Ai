name: Tennis History Probe

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tennis-history-probe:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tennis history probe
        env:
          API_TENNIS_KEY: ${{ secrets.API_TENNIS_KEY }}
          API_TENNIS_BASE_URL: "https://v1.tennis.api-sports.io"
          API_TENNIS_HOST: "v1.tennis.api-sports.io"
          FIXTURES_ENDPOINT: "/fixtures"
          DATE_PARAM: "date"
          DAYS_BACK: "10"
          PROBE_DIR: "jure_probe"
        run: |
          python api_probe.py

      - name: Commit probe files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add api_probe.py
          git add jure_probe/

          if git diff --cached --quiet; then
            echo "No probe changes to commit"
          else
            git commit -m "Update tennis history probe"

            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "Push failed, retrying in 10 seconds..."
              sleep 10
            done
          fi

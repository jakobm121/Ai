name: Tennis History Probe

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tennis-history-probe:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run API-Tennis history probe
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_TENNIS_BASE_URL: "https://api.api-tennis.com/tennis/"
          API_METHOD: "get_fixtures"
          DAYS_BACK: "10"
          PROBE_DIR: "jure_probe"
          MAX_RAW_ITEMS: "300"
        run: |
          python api_probe.py

      - name: Commit probe files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          rm -f jure_probe/history_raw.json

          git add api_probe.py
          git add -A jure_probe/

          if git diff --cached --quiet; then
            echo "No probe changes to commit"
          else
            git commit -m "Update tennis history probe"

            git pull --rebase --autostash origin main
            git push
          fi

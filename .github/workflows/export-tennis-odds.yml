name: Export Tennis Odds

on:
  workflow_dispatch:
  schedule:
    - cron: "15 */3 * * *"

permissions:
  contents: write

concurrency:
  group: export-tennis-odds
  cancel-in-progress: true

jobs:
  export-tennis-odds:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Export canonical tennis odds
        env:
          API_KEY: ${{ secrets.API_KEY }}
          TZ_NAME: "Europe/Ljubljana"
          TENNIS_ODDS_DAYS_AHEAD: "1"
          TENNIS_ODDS_MAX_FIXTURES: "650"
          TENNIS_ODDS_SAVE_RAW_MARKETS: "1"
          TENNIS_ODDS_SAVE_RAW_FIXTURE: "1"
        run: python tennis_odds_export.py

      - name: Validate canonical export
        run: |
          python - <<'PY'
          import json
          from collections import Counter
          from pathlib import Path

          output = Path("data/tennis_odds_today.json")
          debug = Path("data/tennis_odds_export_debug.json")

          for path in [output, debug]:
              if not path.exists():
                  raise SystemExit(f"Missing generated file: {path}")

          data = json.loads(output.read_text(encoding="utf-8"))
          matches = data.get("matches", [])
          summary = data.get("summary", {})

          if data.get("schema_version") != 2:
              raise SystemExit("Unexpected or missing schema_version")

          print("SUMMARY:", summary)
          print("MATCHES:", len(matches))

          print(
              "SURFACES:",
              Counter(match.get("surface") for match in matches),
          )

          print(
              "GENDERS:",
              Counter(match.get("gender") for match in matches),
          )

          print(
              "TOUR LEVELS:",
              Counter(match.get("tour_level") for match in matches),
          )

          for match in matches[:5]:
              print({
                  "event_key": match.get("event_key"),
                  "match": (
                      f"{match.get('player_1')} - "
                      f"{match.get('player_2')}"
                  ),
                  "tournament": match.get("tournament"),
                  "gender": match.get("gender"),
                  "surface": match.get("surface"),
                  "indoor": match.get("indoor"),
                  "best_of": match.get("best_of"),
                  "tour_level": match.get("tour_level"),
                  "market_count": len(
                      match.get("available_markets", [])
                  ),
              })
          PY

      - name: Commit canonical odds export
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/tennis_odds_today.json
          git add data/tennis_odds_export_debug.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update canonical tennis odds export"
          git pull --rebase --autostash origin main
          git push origin HEAD:main

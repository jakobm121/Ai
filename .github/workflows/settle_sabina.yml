name: Settle Sabina

on:
  workflow_dispatch:
  push:
    paths:
      - "data/tennis_results.json"
      - "sabina/**"
      - ".github/workflows/settle_sabina.yml"

permissions:
  contents: write

jobs:
  settle-sabina:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check source files
        run: |
          test -f data/tennis_results.json
          test -f sabina/results/sabina_history.json
          echo "Found main tennis results and Sabina history."

      - name: Settle Sabina from tennis_results.json
        run: |
          python sabina/sabina_settle.py

      - name: Show Sabina files
        run: |
          find sabina -maxdepth 4 -type f -print

      - name: Commit Sabina settled results to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add sabina/results/

          if git diff --cached --quiet; then
            echo "No Sabina settle changes to commit."
          else
            git commit -m "Settle Sabina results"
            git push
          fi

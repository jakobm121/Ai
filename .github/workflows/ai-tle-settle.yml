name: AI TLE Settle Predictions

on:
  workflow_dispatch:

  schedule:
    - cron: "30 20 * * *"
    - cron: "30 5 * * *"

permissions:
  contents: write

jobs:
  settle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout AI repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      - name: Settle AI TLE predictions
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          python ai_tle_settle_predictions.py \
            --results data/tle/predictions/ai_tle_results.json \
            --predictions data/tle/predictions/ai_tle_predictions_latest.json \
            --predictions-table data/tle/predictions/ai_tle_predictions_table.md \
            --results-table data/tle/predictions/ai_tle_results_table.md \
            --timezone Europe/Ljubljana

      - name: Show all results table
        run: |
          cat data/tle/predictions/ai_tle_results_table.md || true

      - name: Commit settled results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/tle/predictions

          if git diff --cached --quiet; then
            echo "No settlement changes."
            exit 0
          fi

          git commit -m "Settle AI TLE predictions"
          git push

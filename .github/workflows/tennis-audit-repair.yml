name: Tennis Audit Repair

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tennis-audit-repair:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Create data folder
        run: |
          mkdir -p data

      - name: Run tennis audit repair
        env:
          API_KEY: ${{ secrets.API_KEY }}
          TENNIS_API_KEY: ${{ secrets.API_KEY }}
        run: |
          python tennis_audit_repair.py

      - name: Commit repaired tennis results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/tennis_results.json || true
          git add data/tennis_audit_repair_debug.json || true

          if git diff --cached --quiet; then
            echo "No repair changes to commit."
          else
            git commit -m "Repair tennis prediction results"
            git push
          fi

      - name: Upload audit repair artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tennis-audit-repair-output
          path: |
            data/tennis_results.json
            data/tennis_audit_repair_debug.json
          if-no-files-found: warn

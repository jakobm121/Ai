name: Tennis Deep Performance Report

on:
  workflow_dispatch:
  schedule:
    - cron: "45 23 * * *"

permissions:
  contents: write

jobs:
  deep-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run deep performance report
        run: python analyze_tennis_deep_performance.py

      - name: Commit report
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/tennis_deep_performance_report.json
          git commit -m "Update tennis deep performance report" || echo "No changes"
          git push

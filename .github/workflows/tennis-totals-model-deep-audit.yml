name: Tennis Totals Model Deep Audit

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run deep model audit
        run: |
          python tennis_totals_model_deep_audit.py

      - name: Commit deep audit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/tennis_totals_model_deep_audit.json || true
          git add data/tennis_totals_model_deep_audit_summary.txt || true

          if git diff --cached --quiet; then
            echo "No audit changes to commit."
          else
            git commit -m "Add tennis totals model deep audit"
            git push
          fi

      - name: Upload deep audit artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tennis-totals-model-deep-audit
          path: |
            data/tennis_totals_model_deep_audit.json
            data/tennis_totals_model_deep_audit_summary.txt
          if-no-files-found: warn

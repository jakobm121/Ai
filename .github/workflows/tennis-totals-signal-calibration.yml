name: Tennis Totals Signal Calibration

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tennis-totals-signal-calibration:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run totals signal calibration report
        run: |
          python tennis_totals_signal_calibration_report.py

      - name: Commit totals signal calibration report
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/tennis_totals_signal_calibration_report.json || true
          git add data/tennis_totals_signal_calibration_summary.txt || true

          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "Add tennis totals signal calibration report"
            git push
          fi

      - name: Upload totals signal calibration artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tennis-totals-signal-calibration
          path: |
            data/tennis_totals_signal_calibration_report.json
            data/tennis_totals_signal_calibration_summary.txt
          if-no-files-found: warn

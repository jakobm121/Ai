name: Lucija Optimizer

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lucija-optimizer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Lucija optimizer
        env:
          DATA_DIR: "data"
          LUCIJA_DIR: "data/lucija"
          TENNIS_TOTALS_RESULTS_FILE: "data/tennis_totals_results.json"
          LUCIJA_OPT_MIN_PICKS: "80"
          LUCIJA_OPT_MIN_SETTLED: "80"
          LUCIJA_OPT_MIN_TEST_PICKS: "20"
          LUCIJA_OPT_TEST_RATIO: "0.25"
          LUCIJA_OPT_TOP_N: "30"
        run: |
          python lucija_optimizer.py

      - name: Commit Lucija optimizer results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add lucija_optimizer.py
          git add data/lucija/lucija_optimizer_report.md
          git add data/lucija/lucija_optimizer_summary.json
          git add data/lucija/lucija_optimizer_best_under.json
          git add data/lucija/lucija_optimizer_best_over.json
          git add data/lucija/lucija_optimizer_top_under.json
          git add data/lucija/lucija_optimizer_top_over.json
          git add data/lucija/lucija_optimizer_v1_picks.json
          git add data/lucija/lucija_optimizer_best_under_picks.json
          git add data/lucija/lucija_optimizer_best_over_picks.json
          git add data/lucija/lucija_optimizer_debug.json

          if git diff --cached --quiet; then
            echo "No Lucija optimizer changes to commit"
          else
            git commit -m "Update Lucija optimizer"
            git pull --rebase --autostash origin main
            git push
          fi

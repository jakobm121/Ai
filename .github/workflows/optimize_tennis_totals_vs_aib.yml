name: Optimize Tennis Totals vs AiB

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  optimize-tennis-totals:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Ai repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tennis totals optimizer
        run: python optimize_tennis_totals_vs_aib.py

      - name: Commit optimizer report
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/tennis_totals_vs_aib_optimizer_report.json
          git commit -m "Update tennis totals optimizer report" || echo "No changes"
          git pull --rebase origin main
          git push

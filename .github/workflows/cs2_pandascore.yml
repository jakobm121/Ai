name: CS2 PandaScore Test Site

on:
  workflow_dispatch:
  schedule:
    # Runs every 30 minutes
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  cs2-pandascore:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Create data folders
        run: |
          mkdir -p data
          mkdir -p web

      - name: Run CS2 predictions
        env:
          PANDASCORE_API_KEY: ${{ secrets.PANDASCORE_API_KEY }}
        run: |
          python pandascore_cs2_predictions.py

      - name: Settle CS2 results
        env:
          PANDASCORE_API_KEY: ${{ secrets.PANDASCORE_API_KEY }}
        run: |
          python pandascore_cs2_settle.py

      - name: Build CS2 site
        run: |
          python build_cs2_site.py

      - name: Commit updated CS2 files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/cs2_predictions.json || true
          git add data/cs2_results.json || true
          git add web/index.html || true
          git add web/style.css || true
          git add web/app.js || true
          git add web/cs2_site_data.json || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update CS2 PandaScore test site"
            git push
          fi

      - name: Upload CS2 artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cs2-pandascore-output
          path: |
            data/cs2_predictions.json
            data/cs2_results.json
            web/cs2_site_data.json
          if-no-files-found: warn

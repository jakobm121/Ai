name: Tennis Totals V2 Wide Shadow Settle

on:
  workflow_dispatch:
  schedule:
    # GitHub cron je UTC.
    # Poletni čas Ljubljana: 09:15, 13:15, 17:15, 22:45
    # Zimski čas Ljubljana: 08:15, 12:15, 16:15, 21:45
    - cron: "15 7 * * *"
    - cron: "15 11 * * *"
    - cron: "15 15 * * *"
    - cron: "45 20 * * *"

permissions:
  contents: write

jobs:
  settle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run V2 Wide Shadow settle
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          python tennis_totals_v2_wide_shadow_settle.py

      - name: Commit settled V2 Wide Shadow results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/tennis_totals_v2_wide_shadow_predictions.json \
                  data/tennis_totals_v2_wide_shadow_results.json \
                  data/tennis_totals_v2_wide_shadow_settle_debug.json || true

          if git diff --cached --quiet; then
            echo "No settle changes to commit."
          else
            git commit -m "Settle tennis totals v2 wide shadow"
            git push
          fi

name: ELO Only Market Backtest

on:
  workflow_dispatch:
    inputs:
      days_back:
        description: "Koliko dni nazaj testira"
        required: false
        default: "5"
      min_elo_diff:
        description: "Minimalna absolutna ELO razlika za pick"
        required: false
        default: "60"
      min_odds:
        description: "Minimalna kvota"
        required: false
        default: "1.90"
      max_odds:
        description: "Maksimalna kvota"
        required: false
        default: "2.70"

jobs:
  elo-only-market-backtest:
    runs-on: ubuntu-latest

    env:
      TENNIS_API_KEY: ${{ secrets.TENNIS_API_KEY }}
      API_KEY: ${{ secrets.API_KEY }}
      BACKTEST_DAYS_BACK: ${{ github.event.inputs.days_back || '5' }}
      MIN_ELO_DIFF: ${{ github.event.inputs.min_elo_diff || '60' }}
      MIN_ODDS: ${{ github.event.inputs.min_odds || '1.90' }}
      MAX_ODDS: ${{ github.event.inputs.max_odds || '2.70' }}
      REQUEST_SLEEP: "0.03"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run ELO only market backtest
        run: |
          python ratings/elo_form_market_backtest.py

      - name: Commit backtest outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add -A ratings/elo_form_market_backtest_report.json \
                   ratings/elo_form_market_backtest_rows.json \
                   ratings/elo_form_market_backtest_missing.json \
                   ratings/elo_form_market_backtest_table.md

          git commit -m "Update ELO only market backtest" || echo "No changes to commit"
          git push

name: ELO Form Market Backtest

on:
  workflow_dispatch:
    inputs:
      days_back:
        description: "Koliko dni nazaj testira"
        required: false
        default: "5"
      form_days_back:
        description: "Koliko dni zgodovine za formo"
        required: false
        default: "45"
      min_elo_diff:
        description: "Minimalna ELO razlika za pick"
        required: false
        default: "60"

jobs:
  elo-form-market-backtest:
    runs-on: ubuntu-latest

    env:
      TENNIS_API_KEY: ${{ secrets.TENNIS_API_KEY }}
      API_KEY: ${{ secrets.API_KEY }}
      BACKTEST_DAYS_BACK: ${{ github.event.inputs.days_back || '5' }}
      FORM_DAYS_BACK: ${{ github.event.inputs.form_days_back || '45' }}
      MIN_ELO_DIFF: ${{ github.event.inputs.min_elo_diff || '60' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run ELO form market backtest
        run: |
          python ratings/elo_form_market_backtest.py

      - name: Commit backtest outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add ratings/elo_form_market_backtest_report.json \
                  ratings/elo_form_market_backtest_rows.json \
                  ratings/elo_form_market_backtest_missing.json \
                  ratings/elo_form_market_backtest_table.md

          git commit -m "Update ELO form market backtest" || echo "No changes to commit"
          git push

name: Tennis Totals V2 Wide Shadow

on:
  workflow_dispatch:
  schedule:
    - cron: "35 7,9,11,14 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-shadow:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run V2 Wide Shadow
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          python tennis_totals_v2_wide_shadow.py

      - name: Commit shadow outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/tennis_totals_v2_wide_shadow_predictions.json
          git add data/tennis_totals_v2_wide_shadow_results.json
          git add data/tennis_totals_v2_wide_shadow_debug.json

          git commit -m "Update tennis totals v2 wide shadow" || echo "No changes to commit"
          git push

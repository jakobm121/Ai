name: Tennis Totals V2 Wide Shadow

on:
  workflow_dispatch:
  schedule:
    # Vsak dan ob 07:05 UTC.
    # Poleti je to približno 09:05 v Sloveniji, pozimi približno 08:05.
    - cron: "5 7 * * *"

permissions:
  contents: write

concurrency:
  group: tennis-totals-v2-wide-shadow
  cancel-in-progress: false

jobs:
  run-tennis-totals-v2-wide-shadow:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run V2 Wide Shadow model
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          python tennis_totals_predictions_v2_wide_shadow.py

      - name: Commit generated data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/tennis_totals_predictions_v2_wide_shadow.json || true
          git add data/tennis_totals_results_v2_wide_shadow.json || true
          git add data/tennis_totals_debug_v2_wide_shadow.json || true
          git add data/tennis_totals_candidates_v2_wide_shadow.json || true

          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update tennis totals V2 wide shadow data"
            git push
          fi

name: AI TLE Scanner

on:
  workflow_dispatch:
    inputs:
      min_edge:
        description: "Minimum TLE edge"
        required: true
        default: "0.05"
      min_ev:
        description: "Minimum EV"
        required: true
        default: "0.00"
      min_start_minutes:
        description: "Only matches starting at least this many minutes from now"
        required: true
        default: "30"
      levels:
        description: "Levels"
        required: true
        default: "challenger,itf,atp_wta,grand_slam"

  schedule:
    - cron: "15 7 * * *"
    - cron: "15 10 * * *"
    - cron: "15 13 * * *"

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout AI repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      - name: Run AI TLE scanner
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          python ai_tle_scanner.py \
            --fallback clean_average \
            --bookmaker Pncl \
            --min-odds 1.20 \
            --max-odds 8.00 \
            --min-overround -0.03 \
            --max-overround 0.18 \
            --max-book-deviation 0.35 \
            --min-start-minutes "${{ inputs.min_start_minutes || '30' }}" \
            --min-edge "${{ inputs.min_edge || '0.05' }}" \
            --min-ev "${{ inputs.min_ev || '0.00' }}" \
            --levels "${{ inputs.levels || 'challenger,itf,atp_wta,grand_slam' }}"

      - name: Show predictions table
        run: |
          cat data/tle/predictions/ai_tle_predictions_table.md || true

      - name: Commit predictions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/tle/predictions

          if git diff --cached --quiet; then
            echo "No prediction changes."
            exit 0
          fi

          git commit -m "Run AI TLE scanner"
          git push

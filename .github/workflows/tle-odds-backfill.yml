name: TLE Odds Backfill

on:
  workflow_dispatch:
    inputs:
      from_date:
        description: "First odds date, YYYY-MM-DD"
        required: true
        default: "2026-06-03"

      to_date:
        description: "Last odds date, YYYY-MM-DD"
        required: true
        default: "2026-06-09"

      replace:
        description: "Replace existing odds archive"
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  odds-backfill:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout AI repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Backfill historical tennis odds
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_SLEEP_SECONDS: "0.8"
        run: |
          REPLACE_ARGUMENT=""

          if [ "${{ inputs.replace }}" = "true" ]; then
            REPLACE_ARGUMENT="--replace"
          fi

          python tle_odds_backfill.py \
            --from-date "${{ inputs.from_date }}" \
            --to-date "${{ inputs.to_date }}" \
            ${REPLACE_ARGUMENT}

      - name: Show odds backfill summary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("data/tle/odds_backfill/tle_odds_backfill_report.json")

          if not path.exists():
              raise SystemExit(f"Missing report: {path}")

          payload = json.loads(path.read_text(encoding="utf-8"))

          print(json.dumps(
              payload.get("summary", {}),
              indent=2,
              ensure_ascii=False,
          ))
          PY

      - name: Commit odds archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            data/tle/odds_backfill/tle_odds_backfill.json \
            data/tle/odds_backfill/tle_odds_backfill_report.json

          if git diff --cached --quiet; then
            echo "No odds backfill changes to commit."
            exit 0
          fi

          git commit -m "Backfill TLE historical odds"
          git push

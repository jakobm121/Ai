name: Tennis Totals Full Settle Chain

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tennis-totals-full-settle-chain
  cancel-in-progress: false

jobs:
  totals-settle-chain:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      API_KEY: ${{ secrets.API_KEY }}
      TENNIS_API_KEY: ${{ secrets.API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Pull latest changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git pull --rebase --autostash origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Create folders
        run: |
          mkdir -p data
          mkdir -p web
          mkdir -p data/tedi
          mkdir -p data/lucija
          mkdir -p data/hana

      - name: Settle main tennis totals
        run: |
          python tennis_totals_settle.py

      - name: Build tennis totals site data
        run: |
          python build_tennis_totals_site.py

      - name: Settle Jakob
        run: |
          python settle_jakob.py

      - name: Settle Tedi
        run: |
          python tedi_settle.py

      - name: Settle Lucija
        run: |
          python lucija_settle.py

      - name: Settle Hana
        run: |
          python hana_settle.py

      - name: Show generated settle files
        if: always()
        run: |
          echo "DATA:"
          find data -maxdepth 4 -type f -print || true

          echo "WEB:"
          find web -maxdepth 2 -type f -print || true

      - name: Commit all settle outputs
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/ || true
          git add web/ || true

          if git diff --cached --quiet; then
            echo "No settle changes to commit."
            exit 0
          fi

          git commit -m "Run tennis totals full settle chain"
          git pull --rebase --autostash origin main
          git push origin main

      - name: Upload settle artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tennis-totals-full-settle-chain-output
          path: |
            data/**
            web/**
          if-no-files-found: warn

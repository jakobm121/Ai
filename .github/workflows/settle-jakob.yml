name: Settle Jakob Tennis Totals Results

on:
  workflow_dispatch:

  schedule:
    # Vsak dan ob 22:30 UTC
    # To je približno 00:30 po Sloveniji poleti oziroma 23:30 pozimi
    - cron: "30 22 * * *"

permissions:
  contents: write

concurrency:
  group: settle-jakob-tennis-totals
  cancel-in-progress: false

jobs:
  settle-jakob:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Jakob settle
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          python settle_jakob.py

      - name: Show generated files
        run: |
          echo "Generated data files:"
          ls -lah data || true

      - name: Commit and push Jakob settled results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add \
            data/jakob_results.json \
            data/jakob_settle_debug.json \
            data/jakob_settle_summary.json \
            data/jakob_settle_table.csv \
            data/jakob_settle_report.md

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Settle Jakob tennis totals results"

          git pull --rebase origin main
          git push origin main

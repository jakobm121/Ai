name: Tennis Totals Alt Line Report

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tennis-totals-alt-line-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run totals alt line report
        run: |
          python tennis_totals_alt_line_report.py

      - name: Commit totals alt line report
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/tennis_totals_alt_line_report.json || true
          git add data/tennis_totals_alt_line_summary.txt || true

          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "Add tennis totals alt line report"
            git push
          fi

      - name: Upload totals alt line report artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tennis-totals-alt-line-report
          path: |
            data/tennis_totals_alt_line_report.json
            data/tennis_totals_alt_line_summary.txt
          if-no-files-found: warn

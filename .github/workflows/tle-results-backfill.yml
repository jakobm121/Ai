name: TLE Results Backfill

on:
  workflow_dispatch:
    inputs:
      from_date:
        description: "First result date, YYYY-MM-DD"
        required: true
        default: "2026-05-27"

      to_date:
        description: "Last result date, YYYY-MM-DD"
        required: true
        default: "2026-06-09"

      replace:
        description: "Replace the existing backfill archive"
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch completed tennis results
        env:
          API_KEY: ${{ secrets.API_KEY }}
          TZ_NAME: Europe/Ljubljana
        run: |
          REPLACE_ARGUMENT=""

          if [ "${{ inputs.replace }}" = "true" ]; then
            REPLACE_ARGUMENT="--replace"
          fi

          python tle_results_backfill.py \
            --from-date "${{ inputs.from_date }}" \
            --to-date "${{ inputs.to_date }}" \
            ${REPLACE_ARGUMENT}

      - name: Show backfill summary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("data/tle/tle_api_results_backfill.json")

          if not path.exists():
              raise SystemExit(f"Missing output: {path}")

          payload = json.loads(path.read_text(encoding="utf-8"))

          print(json.dumps(
              payload.get("summary", {}),
              indent=2,
              ensure_ascii=False,
          ))
          PY

      - name: Commit backfill archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            data/tle/tle_api_results_backfill.json \
            data/tle/tle_api_results_backfill_report.json

          if git diff --cached --quiet; then
            echo "No backfill changes to commit."
            exit 0
          fi

          git commit -m \
            "Update TLE API results backfill ${{ inputs.from_date }} to ${{ inputs.to_date }}"

          git push

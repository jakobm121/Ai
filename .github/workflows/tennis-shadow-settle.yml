name: Tennis Shadow Settle

on:
  workflow_dispatch:
  schedule:
    # Dopoldne
    - cron: "10 8 * * *"
    # Popoldne
    - cron: "10 14 * * *"
    # Zvečer
    - cron: "10 21 * * *"
    # Ponoči, da pobere še pozne tekme
    - cron: "10 1 * * *"

permissions:
  contents: write

jobs:
  settle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull latest changes
        run: |
          git pull --rebase origin main || git pull --rebase origin master

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run tennis shadow settle
        env:
          TENNIS_API_KEY: ${{ secrets.TENNIS_API_KEY }}
        run: |
          python settle_tennis_shadow_results.py

      - name: Commit shadow settled results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/tennis_shadow_results.json data/tennis_shadow_predictions.json data/tennis_shadow_settle_debug.json

          if git diff --cached --quiet; then
            echo "No shadow settled changes to commit."
          else
            git commit -m "Settle tennis shadow results"
            git push
          fi

name: Optimize Tennis Totals

on:
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run optimizer
        run: |
          python optimize_tennis_totals_results.py \
            --input data/tennis_totals_results.json \
            --iterations 1000000

      - name: Commit optimizer outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/tennis_totals_optimizer_report.json \
                  data/tennis_totals_best_rules.json \
                  data/tennis_totals_staking_comparison.json \
                  data/tennis_totals_calibration.json \
                  data/tennis_totals_optimizer_top_rules.csv \
                  data/tennis_totals_optimizer_report.md
          git commit -m "Update tennis totals optimizer report" || echo "No changes"
          git push

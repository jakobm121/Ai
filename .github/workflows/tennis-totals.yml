name: Tennis Totals Value Model

on:
  workflow_dispatch:
  schedule:
    # Runs every 4 hours
    - cron: "30 */4 * * *"

permissions:
  contents: write

jobs:
  tennis-totals-value-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Create data folder
        run: |
          mkdir -p data

      - name: Run tennis totals predictions
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          python tennis_totals_predictions.py

      - name: Commit tennis totals files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/tennis_totals_predictions.json || true
          git add data/tennis_totals_results.json || true
          git add data/tennis_totals_debug.json || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update tennis totals value model"
            git push
          fi

      - name: Upload tennis totals artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tennis-totals-value-output
          path: |
            data/tennis_totals_predictions.json
            data/tennis_totals_results.json
            data/tennis_totals_debug.json
          if-no-files-found: warn

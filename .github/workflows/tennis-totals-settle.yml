name: Tennis Totals Settle

on:
  workflow_dispatch:
  schedule:
    # 08:30 Balkan poleti
    - cron: "30 6 * * *"

    # 14:00 Balkan poleti
    - cron: "0 11 * * *"

    # 15:00 Balkan poleti
    - cron: "0 12 * * *"

    # 23:30 Balkan poleti
    - cron: "30 21 * * *"

permissions:
  contents: write

jobs:
  tennis-totals-settle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Create data and web folders
        run: |
          mkdir -p data
          mkdir -p web

      - name: Settle tennis totals results
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          python tennis_totals_settle.py

      - name: Build tennis totals site data
        run: |
          python build_tennis_totals_site.py

      - name: Commit tennis totals settled results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/tennis_totals_results.json || true
          git add data/tennis_totals_settle_debug.json || true
          git add web/tennis_totals_site_data.json || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Settle tennis totals results"
            git push
          fi

      - name: Upload tennis totals settle artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tennis-totals-settle-output
          path: |
            data/tennis_totals_results.json
            data/tennis_totals_settle_debug.json
            web/tennis_totals_site_data.json
          if-no-files-found: warn
